# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "fbc28fda2161d2fc40037b0d211b83c9"
name = "stockly"
application_url = "https://example.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# write_customers — needed to write the wholesale-status metafield on
# customers from the orders/paid webhook handler (ADR-004 FPQ flow).
scopes = "write_products,read_publications,write_publications,write_discounts,write_customers"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # FPQ qualification (ADR-004). When a wholesale-tagged customer's
  # paid order meets the shop's first-purchase qualifier, our handler
  # writes a customer metafield that the Discount Function reads to
  # skip the FPQ gate on subsequent carts.
  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/paid"
  topics = [ "orders/paid" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[app_proxy]
# Storefront URL /apps/stockly/* is forwarded to our backend /proxy/*.
# The full proxy URL is set automatically by the CLI to the dev tunnel
# during development, and to the production app URL on deploy.
url = "https://example.com/proxy"
subpath = "stockly"
prefix = "apps"

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
