# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "fbc28fda2161d2fc40037b0d211b83c9"
name = "stockly"
application_url = "https://example.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_publications,write_publications,write_discounts"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[app_proxy]
# Storefront URL /apps/stockly/* is forwarded to our backend /proxy/*.
# The full proxy URL is set automatically by the CLI to the dev tunnel
# during development, and to the production app URL on deploy.
url = "https://example.com/proxy"
subpath = "stockly"
prefix = "apps"

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
