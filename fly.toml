# fly.toml app configuration file generated for stockly-lustrous-forest-4364 on 2026-05-26T01:35:17+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# HISTORICAL — kept for reference / possible rollback only. Production
# moved off Fly.io to Railway (2026-06-24). The `stockly-lustrous-
# forest-4364` app referenced below no longer exists (DNS doesn't
# resolve). Railway relies on auto-detection, not this file — nothing
# reads it today. See HANDOFF.md for the current deploy target.
#

app = 'stockly-lustrous-forest-4364'
primary_region = 'iad'

[build]

[deploy]
  # Use db push since we don't version migrations (see vercel.json history).
  # --skip-generate because the client was already generated at build time.
  release_command = 'npx prisma db push --skip-generate'

[env]
  PORT = '3000'
  SCOPES = 'read_orders,write_customers,write_discounts,write_products,write_publications'
  SHOPIFY_API_KEY = 'fbc28fda2161d2fc40037b0d211b83c9'
  SHOPIFY_APP_URL = 'https://stockly-lustrous-forest-4364.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  # 'suspend' (vs 'stop') preserves memory between sleeps so resume is
  # ~100ms instead of the 5-30s cold start we used to see. With
  # min_machines_running = 1 the primary machine never sleeps, so this
  # only affects secondary machines (B0-6 audit fix).
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # HTTP health checks against the lightweight /healthz route (no DB,
  # no Shopify auth — see app/routes/healthz.tsx). Fly uses these for:
  #   - readiness during deploys (route traffic only when /healthz 200s)
  #   - liveness in steady state (restart the machine if /healthz
  #     starts failing for `consecutive` * `interval` seconds)
  # Tuned conservative: 30s interval, 5s timeout, 10s grace at boot.
  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
