# fly.toml app configuration file generated for stockly-lustrous-forest-4364 on 2026-05-26T01:35:17+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stockly-lustrous-forest-4364'
primary_region = 'iad'

[build]

[deploy]
  # Use db push since we don't version migrations (see vercel.json history).
  # --skip-generate because the client was already generated at build time.
  release_command = 'npx prisma db push --skip-generate'

[env]
  PORT = '3000'
  SCOPES = 'read_orders,write_customers,write_discounts,write_products,write_publications'
  SHOPIFY_API_KEY = 'fbc28fda2161d2fc40037b0d211b83c9'
  SHOPIFY_APP_URL = 'https://stockly-lustrous-forest-4364.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
